<div class="container">
    <div class="card my-5">
        <app-course [course]="course"></app-course>
    </div>
    <div class="card my-5">
        <div class="card-header">
            <h2>ESTUDIANTES</h2>
        </div>
        <table class="table table-striped">
            <thead>
                <th>ID</th>
                <th>IDENTIFICACION</th>
                <th>NOMBRE</th>
                <th>APELLIDO</th>
            </thead>
            <tbody>
                @for (student of course.students; track $index) {
                <tr student-list [student]="student"></tr>
                }
            </tbody>
        </table>
    </div>
</div>
