<div class="container">
    <div class="card my-5">
        <div class="card-header">
            <h2>FACTURA</h2>
        </div>
        <div class="card-body">
            <ul class="list-group">
                <li class="list-group-item">No. {{invoice.id}}</li>
            </ul>
        </div>
        <div class="row">
            <div class="col">
                <app-company-view [company]="invoice.company"></app-company-view>
            </div>
            <div class="col">
                <app-customer-view [customer]="invoice.customer"></app-customer-view>
            </div>
        </div>
        <div class="my-5">
            <app-invoice-detail [items]="invoice.items"></app-invoice-detail>
        </div>
    </div>
</div>
